<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TON Wallet</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #020617, #0f172a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .title {
    text-align: center;
    font-size: 24px;
    margin-bottom: 20px;
  }

  .card {
    background: #111827;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .card h2 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: #9ca3af;
  }

  .card p {
    margin: 0;
    font-size: 20px;
    font-weight: bold;
  }

  .button {
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    color: white;
    transition: 0.3s;
  }

  .deposit {
    background: #3b82f6;
  }
  .deposit:hover {
    background: #2563eb;
  }

  .send {
    background: #10b981;
  }
  .send:hover {
    background: #059669;
  }

  .commission {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    color: #9ca3af;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title">🟣 TON Wallet</div>

  <div class="card">
    <h2>💰 Balance</h2>
    <p id="balance">0.000 TON</p>
  </div>

  <div class="card">
    <h2>💼 Address</h2>
    <p id="address">EQ_...YOUR_ADDRESS...</p>
  </div>

  <button class="button deposit" onclick="alert('Deposit clicked!')">➕ Deposit</button>
  <button class="button send" onclick="alert('Send clicked!')">✉️ Send</button>

  <div class="commission">⚡ Commission: 0.25%</div>
</div>

<script>
  // ==== STUB DATA ====
  const userAddress = 'EQAy81M_996vELPDJISuBsaPNggPxlk6V2EJ4iM2DqGMio35';
  const userBalance = 0.000;

  // ==== INSERT DATA INTO PAGE ====
  document.getElementById('address').innerText = userAddress;
  document.getElementById('balance').innerText = userBalance.toFixed(3) + ' TON';
</script>
</body>
</html>
