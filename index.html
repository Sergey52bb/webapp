<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TON Wallet</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #020617, #0f172a);
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.title {
  text-align: center;
  font-size: 22px;
  margin-bottom: 20px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 18px;
  margin-bottom: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.balance {
  font-size: 28px;
  font-weight: bold;
}

.address {
  font-size: 12px;
  opacity: 0.7;
  word-break: break-all;
}

.buttons {
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  background: #2563eb;
  color: white;
}

.btn.secondary {
  background: #1f2937;
}

.big-btn {
  width: 100%;
  margin-top: 10px;
  padding: 15px;
  border-radius: 14px;
  font-size: 16px;
  background: #7c3aed;
  border: none;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🟣 TON Wallet</div>

<div class="card">
  <div>💰 Balance</div>
  <div class="balance" id="balance">Loading...</div>
</div>

<div class="card">
  <div>💼 Address</div>
  <div class="address" id="address">Loading...</div>
</div>

<div class="buttons">
  <button class="btn">➕ Deposit</button>
  <button class="btn secondary">✉️ Send</button>
</div>

<button class="big-btn" onclick="loadData()">🔄 Refresh</button>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const chatId = tg.initDataUnsafe?.user?.id;

// 🔥 Загрузка данных
async function loadData() {
  try {
    const res = await fetch(`http://YOUR_IP:3001/user?id=${chatId}`);
    const data = await res.json();

    document.getElementById('balance').innerText = data.balance + ' TON';
    document.getElementById('address').innerText = data.address;

  } catch (e) {
    document.getElementById('balance').innerText = 'Error';
  }
}

loadData();
</script>

</body>
</html>
