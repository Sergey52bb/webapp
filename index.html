<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TON Wallet</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, Arial;
  background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
  color: white;
  height: 100vh;
}

/* фон с эффектом */
body::before {
  content: '';
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,136,255,0.2), transparent);
  animation: move 10s linear infinite;
}

@keyframes move {
  0% { transform: translate(-25%, -25%); }
  100% { transform: translate(25%, 25%); }
}

.container {
  position: relative;
  z-index: 2;
  padding: 20px;
}

.title {
  text-align: center;
  font-size: 26px;
  margin-bottom: 20px;
  font-weight: bold;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.1);
}

.balance {
  font-size: 32px;
  font-weight: bold;
  margin-top: 10px;
}

.address {
  font-size: 13px;
  word-break: break-all;
  margin-top: 10px;
  opacity: 0.8;
}

/* кнопки */
.btn {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  margin-top: 10px;
  cursor: pointer;
}

.deposit {
  background: linear-gradient(90deg, #3b82f6, #2563eb);
}

.send {
  background: linear-gradient(90deg, #10b981, #059669);
}

.refresh {
  background: linear-gradient(90deg, #9333ea, #7c3aed);
}

.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🟣 TON Wallet</div>

<div class="card">
  <div>💰 Balance</div>
  <div class="balance" id="balance">0.000 TON</div>
</div>

<div class="card">
  <div>💼 Address</div>
  <div class="address" id="address">Loading...</div>
</div>

<button class="btn deposit">➕ Deposit</button>
<button class="btn send">✉️ Send</button>
<button class="btn refresh" onclick="loadData()">🔄 Refresh</button>

<div class="footer">⚡ Commission: 0.25%</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const userId = tg.initDataUnsafe?.user?.id;

async function loadData() {
  try {
    const res = await fetch(`https://ton-wallet-api.onrender.com/user?id=${userId}`);
    const data = await res.json();

    document.getElementById('balance').innerText = data.balance + ' TON';
    document.getElementById('address').innerText = data.address;
  } catch (e) {
    console.log(e);
  }
}

loadData();
</script>

</body>
</html>
