<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TON Wallet</title>

<!-- Telegram SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
  background: linear-gradient(180deg, #020617, #0f172a);
  color: white;
}

.container {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 20px;
}

.title {
  text-align: center;
  font-size: 26px;
  margin-top: 10px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 16px;
  margin-top: 15px;
}

.balance {
  font-size: 28px;
  font-weight: bold;
}

.address {
  font-size: 12px;
  opacity: 0.7;
  word-break: break-all;
}

.buttons {
  margin-top: 20px;
}

.btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  margin-top: 10px;
  color: white;
}

.deposit { background: #2563eb; }
.send { background: #10b981; }
.refresh { background: #7c3aed; }

.footer {
  text-align: center;
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<div>
  <div class="title">🟣 TON Wallet</div>

  <div class="card">
    <div>💰 Balance</div>
    <div class="balance" id="balance">Loading...</div>
  </div>

  <div class="card">
    <div>💼 Address</div>
    <div class="address" id="address">Loading...</div>
  </div>
</div>

<div class="buttons">
  <button class="btn deposit" onclick="deposit()">➕ Deposit</button>
  <button class="btn send" onclick="send()">✉️ Send</button>
  <button class="btn refresh" onclick="loadData()">🔄 Refresh</button>
</div>

<div class="footer">⚡ Commission: 0.25%</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// 👉 получаем ID пользователя Telegram
const userId = tg.initDataUnsafe?.user?.id;

// 🔥 ВРЕМЕННО (пока без сервера)
const fakeData = {
  address: "EQAy81M_996vELPDJISuBsaPNggPxlk6V2EJ4iM2DqGMio35",
  balance: 0.000
};

// 🔥 загрузка данных
function loadData() {
  // ПОКА используем фейк (потом подключим API)
  document.getElementById('address').innerText = fakeData.address;
  document.getElementById('balance').innerText = fakeData.balance.toFixed(3) + " TON";
}

// кнопки
function deposit() {
  alert("Send TON to your address");
}

function send() {
  alert("Send feature coming soon");
}

loadData();
</script>

</body>
</html>
