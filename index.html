<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TON Wallet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    .card {
      background: #111827;
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .btn {
      display: block;
      margin: 10px;
      padding: 15px;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>🟣 TON Wallet</h2>

<div class="card">
  <p>💰 Balance</p>
  <h1>0.00 TON</h1>
</div>

<div class="card">
  <p>💼 Address</p>
  <small>EQ...YOUR_ADDRESS...</small>
</div>

<button class="btn">➕ Deposit</button>
<button class="btn">✉️ Send</button>

</body>
</html>
